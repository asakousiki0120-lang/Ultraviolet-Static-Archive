<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultraviolet</title>

  <!-- UV Core -->
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>

  <!-- UV Handler -->
  <script src="/uv/uv.handler.js"></script>

  <!-- No meta refresh / no auto redirect -->
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding-top: 50px;
    }
    input {
      width: 80%;
      padding: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <h1>Ultraviolet</h1>
  <p>Enter a URL to proxy:</p>

  <input id="uv-input" placeholder="https://example.com" />

  <script>
    const input = document.getElementById("uv-input");

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        let url = input.value.trim();
        if (!url.startsWith("http")) {
          url = "https://" + url;
        }
        location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
      }
    });

    // Safe Service Worker registration
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/uv/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
